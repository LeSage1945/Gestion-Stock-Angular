<div class="container-fluid">

  <!-- ================= HEADER ================= -->

  <div class="d-flex justify-content-between align-items-center mb-4">

    <div>

      <h3 class="fw-bold mb-1">
        👤 Gestion des Utilisateurs
      </h3>

      <p class="text-muted mb-0">
        Administration des comptes utilisateurs
      </p>

    </div>

    <button class="btn btn-primary" (click)="onAdd()">
      <i class="bi bi-person-plus me-2"></i>
      Ajouter utilisateur
    </button>

  </div>

  <!-- ================= STATS ================= -->

  <div class="row g-4 mb-4">

    <!-- TOTAL -->
    <div class="col-md-4">

      <div class="card border-0 shadow-sm bg-primary text-white rounded-4">

        <div class="card-body">

          <h6 class="text-uppercase opacity-75">
            Total utilisateurs
          </h6>

          <h2 class="fw-bold mb-0">
            {{ totalUser$ | async }}
          </h2>

        </div>

      </div>

    </div>

    <!-- ADMIN -->
    <div class="col-md-4">

      <div class="card border-0 shadow-sm bg-success text-white rounded-4">

        <div class="card-body">

          <h6 class="text-uppercase opacity-75">
            Admins
          </h6>

          <h2 class="fw-bold mb-0">
            {{ totalAdmin$ | async }}
          </h2>

        </div>

      </div>

    </div>

    <!-- CAISSIERS -->
    <div class="col-md-4">

      <div class="card border-0 shadow-sm bg-warning text-dark rounded-4">

        <div class="card-body">

          <h6 class="text-uppercase opacity-75">
            Caissiers
          </h6>

          <h2 class="fw-bold mb-0">
            {{ totalCaissier$ | async }}
          </h2>

        </div>

      </div>

    </div>

  </div>

  <!-- ================= LOADER ================= -->

  @if (isLoading) {

    <div class="mb-3">

      <app-loader-component
        [isLoading]="true">
      </app-loader-component>

    </div>

  }

  <!-- ================= TABLE ================= -->

  <app-table-component

    [data]="(users$ | async) || []"
    [columns]="usersColumns"
    [titre]="titreTable"
    [enableSearch]="true"
    [actions]="true"

    (view)="onView($event)"
    (edit)="onEdit($event)"
    (delete)="onDelete($event)"

    [roleStyleFn]="getRoleStyle">

  </app-table-component>

</div>
