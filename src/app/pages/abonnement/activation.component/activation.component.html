<div
  class="modal-header text-white px-4 py-3"
  style="background-color: #1c2229; border-top-left-radius: 8px; border-top-right-radius: 8px"
>
  <h5 class="modal-title fw-bold m-0">Configuration de l'abonnement</h5>
  <button type="button" class="btn-close btn-close-white" (click)="annuler()"></button>
</div>

<div mat-dialog-content class="p-4 m-0 bg-white text-dark">
  <label for="modalJours" class="form-label fw-bold text-dark mb-2"
    >Durée de l'activation (en jours)</label
  >

  <div class="input-group input-group-lg">
    <input
      id="modalJours"
      type="number"
      class="form-control text-center fw-bold text-dark"
      [value]="joursSaisis"
      (input)="joursSaisis = +$any($event.target).value"
      min="1"
      placeholder="Ex: 30"
      style="border-radius: 6px 0 0 6px"
    />
    <span
      class="input-group-text fw-bold bg-light text-secondary px-4"
      style="border-radius: 0 6px 6px 0"
      >Jours</span
    >
  </div>

  <small class="text-muted d-block mt-2"
    >L'accès du client sera automatiquement calculé et prolongé à partir d'aujourd'hui.</small
  >
</div>

<div
  mat-dialog-actions
  class="bg-light border-top-0 px-4 py-3 d-flex justify-content-end gap-2"
  style="border-bottom-left-radius: 8px; border-bottom-right-radius: 8px"
>
  <button
    type="button"
    class="btn btn-secondary fw-semibold px-3 py-2"
    style="border-radius: 6px"
    (click)="annuler()"
  >
    Annuler
  </button>
  <button
    type="button"
    class="btn btn-success fw-bold px-4 py-2 shadow-sm"
    style="background-color: #198754; border: none; border-radius: 6px"
    (click)="confirmer()"
  >
    Confirmer l'accès
  </button>
</div>
