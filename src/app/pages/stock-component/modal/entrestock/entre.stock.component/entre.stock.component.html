<div class="modal fade show d-block" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <!-- HEADER -->
      <div class="modal-header bg-success text-white">
        <h5 class="modal-title">📥 Entrée de stock</h5>
        <button class="btn-close btn-close-white" (click)="close()"></button>
      </div>

      <!-- BODY -->
      <div class="modal-body">
        <!-- PRODUIT -->
        <div class="mb-3">
          <label class="text-muted">Produit</label>
          <input class="form-control" [value]="data.produit.nom" disabled />
        </div>

        <!-- QUANTITE -->
        <div class="mb-3">
          <label>Quantité (en paquets)</label>
          <input
            type="number"
            class="form-control"
            [(ngModel)]="quantite"
            min="1"
            placeholder="Ex: 125"
          />
        </div>

        <!-- MONTANT TOTAL PAYÉ -->
        <div class="mb-3">
          <label>Montant total payé (FCFA)</label>
          <input
            type="number"
            class="form-control"
            [(ngModel)]="montantTotal"
            min="1"
            placeholder="Ex: 98250"
          />
        </div>

        <!-- PRIX UNITAIRE CALCULÉ -->
        @if (quantite > 0 && montantTotal > 0) {
          <div class="alert alert-info py-2 mb-3">
            💡 Prix unitaire calculé :
            <strong>{{ prixUnitaire | number: '1.0-0' }} FCFA / paquet</strong>
          </div>
        }

        <!-- FOURNISSEUR -->
        <div class="mb-3">
          <label>Fournisseur</label>
          <select class="form-control" [(ngModel)]="fournisseurId">
            <option value="">-- Choisir un fournisseur --</option>
            @for (f of fournisseurs; track f.id) {
              <option [value]="f.id">{{ f.nom }}</option>
            }
          </select>
        </div>
      </div>

      <!-- FOOTER -->
      <div class="modal-footer">
        <button class="btn btn-outline-secondary" (click)="close()">Annuler</button>
        <button class="btn btn-success" (click)="save()">Valider</button>
      </div>
    </div>
  </div>
</div>
