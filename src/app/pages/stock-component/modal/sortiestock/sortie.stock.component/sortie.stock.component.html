<div class="modal fade show d-block" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <!-- HEADER -->
      <div class="modal-header bg-danger text-white">
        <h5 class="modal-title">📤 Sortie de stock</h5>
        <button class="btn-close btn-close-white" (click)="close()"></button>
      </div>

      <!-- BODY -->
      <div class="modal-body">
        <!-- PRODUIT -->
        <div class="mb-3">
          <label class="text-muted">Produit</label>
          <input class="form-control" [value]="data.nom" disabled />
        </div>

        <!-- QUANTITE -->
        <div class="mb-3">
          <label>Quantité</label>
          <input type="number" class="form-control" [(ngModel)]="quantite" />
        </div>

        <!-- RAISON -->
        <div class="mb-3">
          <label>Raison de la sortie</label>
          <input
            class="form-control"
            [(ngModel)]="raison"
            placeholder="Ex: vente, casse, perte..."
          />
        </div>
      </div>

      <!-- FOOTER -->
      <div class="modal-footer">
        <button class="btn btn-outline-secondary" (click)="close()">Annuler</button>

        <button class="btn btn-danger" (click)="save()">Valider sortie</button>
      </div>
    </div>
  </div>
</div>
