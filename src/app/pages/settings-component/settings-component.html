<div class="container-fluid">
  <!-- ================= HEADER ================= -->

  <div class="mb-4">
    <h3 class="fw-bold mb-1">⚙️ Paramètres du système</h3>

    <p class="text-muted mb-0">Configuration générale de l’application de gestion de stock</p>
  </div>

  <!-- ================= FORM GRID ================= -->

  <div class="row g-4">
    <!-- ================= BOUTIQUE ================= -->

    <div class="col-md-6">
      <div class="card border-0 shadow-sm rounded-4 h-100">
        <div class="card-body p-4">
          <h5 class="fw-bold mb-4">🏪 Informations boutique</h5>

          <!-- NOM -->
          <div class="mb-3">
            <label class="form-label fw-semibold"> Nom de la boutique </label>

            <input
              type="text"
              class="form-control form-control-lg rounded-3"
              placeholder="Ex: Stock Central"
            />
          </div>

          <!-- ADRESSE -->
          <div class="mb-3">
            <label class="form-label fw-semibold"> Adresse </label>

            <input
              type="text"
              class="form-control form-control-lg rounded-3"
              placeholder="Ex: Pointe-Noire"
            />
          </div>

          <!-- TELEPHONE -->
          <div class="mb-3">
            <label class="form-label fw-semibold"> Téléphone </label>

            <input
              type="text"
              class="form-control form-control-lg rounded-3"
              placeholder="+242..."
            />
          </div>
        </div>
      </div>
    </div>

    <!-- ================= STOCK ================= -->

    <div class="col-md-6">
      <div class="card border-0 shadow-sm rounded-4 h-100">
        <div class="card-body p-4">
          <h5 class="fw-bold mb-4">📦 Gestion du stock</h5>

          <!-- SEUIL -->
          <div class="mb-3">
            <label class="form-label fw-semibold"> Seuil d’alerte stock faible </label>

            <input
              type="number"
              class="form-control form-control-lg rounded-3"
              placeholder="Ex: 10"
            />
          </div>

          <!-- CHECKBOX 1 -->
          <div class="form-check mb-3">
            <input class="form-check-input" type="checkbox" id="autoStock" />

            <label class="form-check-label fw-semibold" for="autoStock">
              Activer alertes automatiques
            </label>
          </div>

          <!-- CHECKBOX 2 -->
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="autoDeduction" />

            <label class="form-check-label fw-semibold" for="autoDeduction">
              Déduction automatique du stock
            </label>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ================= SAVE BUTTON ================= -->

  <div class="d-flex justify-content-end mt-4">
    <button class="btn btn-primary btn-lg px-4 shadow-sm">💾 Sauvegarder les paramètres</button>
  </div>
</div>
