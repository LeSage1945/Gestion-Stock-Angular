<div class="container-fluid">
  <!-- ===== HEADER ===== -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h3 class="fw-bold mb-1">⚙️ Paramètres</h3>
      <p class="text-muted mb-0">Gérez votre profil et vos préférences</p>
    </div>
  </div>

  <div class="row g-4">
    <!-- ===== SIDEBAR ===== -->
    <div class="col-md-3">
      <div class="card border-0 shadow-sm rounded-4 text-center p-4">
        <div class="avatar-circle mx-auto mb-3">
          {{ getInitials() }}
        </div>

        <h5 class="fw-bold mb-1">{{ user()?.nom || '—' }}</h5>
        <p class="text-muted small mb-2">{{ user()?.email || '—' }}</p>

        <span class="badge px-3 py-2 mb-4" [class]="getRoleBadgeClass()">
          {{ user()?.role || '—' }}
        </span>

        <div class="d-flex flex-column gap-2">
          <button
            class="settings-tab-btn"
            [class.active]="activeTab() === 'profil'"
            (click)="setTab('profil')"
          >
            👤 Profil
          </button>

          <button
            class="settings-tab-btn"
            [class.active]="activeTab() === 'securite'"
            (click)="setTab('securite')"
          >
            🔒 Sécurité
          </button>

          <button
            class="settings-tab-btn"
            [class.active]="activeTab() === 'apparence'"
            (click)="setTab('apparence')"
          >
            🎨 Apparence
          </button>
        </div>
      </div>
    </div>

    <!-- ===== CONTENT ===== -->
    <div class="col-md-9">
      <!-- ================= PROFIL ================= -->
      @if (activeTab() === 'profil') {
        <div class="card border-0 shadow-sm rounded-4 p-4">
          <input
            type="text"
            class="form-control mb-3"
            [value]="profileForm().nom"
            (input)="updateProfileField('nom', $event)"
            placeholder="Nom"
          />

          <input
            type="email"
            class="form-control mb-3"
            [value]="profileForm().email"
            (input)="updateProfileField('email', $event)"
            placeholder="Email"
          />

          <button class="btn btn-primary" (click)="updateProfile()">Enregistrer</button>
        </div>
      }

      <!-- ================= SECURITE ================= -->
      @if (activeTab() === 'securite') {
        <div class="card border-0 shadow-sm rounded-4 p-4">
          <input
            [type]="showPassword() ? 'text' : 'password'"
            class="form-control mb-3"
            [value]="passwordForm().motDePasse"
            (input)="updatePasswordField('motDePasse', $event)"
            placeholder="Mot de passe"
          />

          <input
            [type]="showConfirmation() ? 'text' : 'password'"
            class="form-control mb-3"
            [value]="passwordForm().confirmation"
            (input)="updatePasswordField('confirmation', $event)"
            placeholder="Confirmation"
          />

          <button class="btn btn-warning" (click)="updatePassword()">Changer mot de passe</button>
        </div>
      }

      <!-- ================= APPARENCE ================= -->
      @if (activeTab() === 'apparence') {
        <div class="card border-0 shadow-sm rounded-4 p-4">
          <select
            class="form-select mb-3"
            [value]="apparenceForm().theme"
            (change)="updateApparenceField('theme', $event)"
          >
            <option value="light">Clair</option>
            <option value="dark">Sombre</option>
            <option value="system">Système</option>
          </select>

          <button class="btn btn-success" (click)="saveApparence()">Sauvegarder</button>
        </div>
      }
    </div>
  </div>
</div>
