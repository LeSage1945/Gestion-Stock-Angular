<div class="sidebar d-flex flex-column">

  <!-- ===== LOGO ===== -->
  <div class="sidebar-brand text-center py-4">
    <span class="fs-5 fw-bold text-white">
      <i class="bi bi-box2-heart me-2"></i>Stock App
    </span>
  </div>

  <!-- ===== ABONNEMENT BLOQUÉ ===== -->
  @if (isBlocked) {
    <div class="mx-3 mb-2">
      <div class="alert alert-danger d-flex align-items-center gap-2 py-2 px-3 mb-0"
        style="font-size: 0.8rem; border-radius: 8px">
        <i class="bi bi-exclamation-triangle-fill"></i>
        Abonnement expiré
      </div>
    </div>
  }

  <!-- ===== MENU GROUPÉ ===== -->
  <nav class="sidebar-nav flex-grow-1 px-2 overflow-auto">
    @for (group of groupedMenu; track group[0]) {
      <div class="sidebar-group mb-1">
        <p class="sidebar-group-label px-3 mb-1">{{ group[0] }}</p>
        @for (item of group[1]; track item.route) {
          <a [routerLink]="item.route"
            routerLinkActive="active"
            class="sidebar-link d-flex align-items-center gap-3 px-3 py-2 rounded-3 text-decoration-none">
            <i [class]="item.icon" class="sidebar-icon"></i>
            <span>{{ item.label }}</span>
          </a>
        }
      </div>
    }
  </nav>

  <!-- ===== FOOTER ===== -->
  <div class="sidebar-footer px-3 py-3">
    <small class="d-flex align-items-center gap-2">
      <i class="bi bi-shield-check text-success"></i>
      <span class="text-muted">Stock App v1.0</span>
    </small>
  </div>

</div>
