<div class="container login-container">
  <div class="row login-card">
    <div class="col-md-6 login-image"></div>

    <div class="col-md-6 login-form">
      <h3 class="title">Inscription</h3>
      <p class="subtitle">Créer un compte utilisateur</p>

      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <!-- NOM -->
        <div>
          <label>Nom</label>
          <input type="text" class="form-control" formControlName="nom" />
        </div>

        <!-- EMAIL -->
        <div class="mt-3">
          <label>Email</label>
          <input type="email" class="form-control" formControlName="email" />
        </div>

        <!-- PASSWORD -->
        <div class="mt-3">
          <label>Mot de passe</label>
          <input type="password" class="form-control" formControlName="motDePasse" />
        </div>

        <!-- BUTTON -->
        <button class="btn btn-primary w-100 mt-4" type="submit">S'inscrire</button>

        <p class="text-danger text-center mt-2">
          {{ messageErreur }}
        </p>
      </form>
    </div>
  </div>
</div>
